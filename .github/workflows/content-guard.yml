name: Content Guard

on:
  pull_request:
    paths:
      - "content/**"

jobs:
  content-secret-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Scan content/ for GM-only markers
        run: |
          if grep -rniE "SECRET:|GM-ONLY:" content/; then
            echo "::error::Found a SECRET:/GM-ONLY: marker in content/. This repo is public and content/ is published live \
            to GitHub Pages — remove or relocate this content (see AGENTS.md) before merging."
            exit 1
          fi
          echo "No GM-only markers found in content/."
