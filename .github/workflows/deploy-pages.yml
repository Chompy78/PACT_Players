name: Deploy Quartz Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  content-secret-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Scan content/ for GM-only markers
        run: |
          if grep -rniE "SECRET:|GM-ONLY:" content/; then
            echo "::error::Found a SECRET:/GM-ONLY: marker in content/. This repo is public and content/ is published live \
            to GitHub Pages — remove or relocate this content (see AGENTS.md) before it can deploy."
            exit 1
          fi
          echo "No GM-only markers found in content/."

  build:
    needs: content-secret-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Build Quartz
        run: npx quartz build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
