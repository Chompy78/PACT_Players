name: Deploy Quartz Site

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Auto-generate handout pages
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # For a direct push, always run. For the auto-handout Action's own commit
    # (pushed with GITHUB_TOKEN, which GitHub deliberately excludes from
    # triggering other `on: push` workflows), only run if that Action actually
    # made a commit, and skip if it failed.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci
      
      - name: Install Quartz plugins
        run: npx quartz plugin install
      
      - name: Build Quartz
        run: npx quartz build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
