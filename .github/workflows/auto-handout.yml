name: Auto-generate handout pages

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.png"
      - "content/**/*.jpg"
      - "content/**/*.jpeg"
      - "content/**/*.gif"
      - "content/**/*.webp"

permissions:
  contents: write

jobs:
  auto-handout:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Only the images newly ADDED by this push — never the whole content/
      # tree, so pre-existing images that were deliberately left without a
      # standalone page are never touched.
      - name: Determine newly added images
        run: |
          git diff --name-only --diff-filter=A "${{ github.event.before }}" "${{ github.sha }}" -- \
            'content/**/*.png' 'content/**/*.jpg' 'content/**/*.jpeg' 'content/**/*.gif' 'content/**/*.webp' \
            > /tmp/added-images.txt
          echo "Newly added images in this push:"
          cat /tmp/added-images.txt

      - name: Rename any unsafe filenames (underscores -> hyphens)
        run: node .github/scripts/rename-unsafe-filenames.mjs /tmp/added-images.txt

      - name: Optimize newly added images
        run: node .github/scripts/optimize-images.mjs /tmp/added-images.txt

      - name: Create stub pages for newly added images
        run: node .github/scripts/auto-handout-stub.mjs /tmp/added-images.txt

      - name: Commit and push if anything changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto: fix filenames, optimize new images, add handout stub pages"
          file_pattern: content
